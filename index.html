<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة اعتذار يا Boo</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0f172a, #3a0ca3);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}
.container {
    text-align: center;
    background: rgba(255,255,255,0.07);
    padding: 50px;
    border-radius: 25px;
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    max-width: 520px;
    z-index: 2;
}
h1 { font-size: 2.6em; margin-bottom: 20px; }
#message {
    font-size: 1.2em;
    line-height: 2;
    min-height: 140px;
}
button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    font-size: 1.1em;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}
#ok { background: #ff4d6d; color: white; }
#ok:hover { background: #e63950; }
#ignore { background: #888; color: white; position: absolute; }
#voiceBtn { background: #6c63ff; color: white; }

.heart {
    position: fixed;
    width: 18px;
    height: 18px;
    background: #ff4d6d;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
    z-index: 1;
}
.heart::before,
.heart::after {
    content: '';
    width: 18px;
    height: 18px;
    background: #ff4d6d;
    border-radius: 50%;
    position: absolute;
}
.heart::before { top: -9px; left: 0; }
.heart::after { left: -9px; top: 0; }
@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="container">
    <h1>آسف يا Boo 🤍</h1>
    <div id="message"></div>

    <button id="ok">قبلت اسفك خلاص مش زعلانة</button>
    <button id="ignore">لا</button>
    <br>
    <button id="voiceBtn">اسمع الرسالة</button>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<audio id="voiceNote" preload="auto">
    <source src="WhatsApp Ptt 2026-03-22 at 1.48.18 PM.ogg" type="audio/mpeg">
</audio>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyjzQUzi3othbtNg3xUkgBGqrLLvOMMPBfSpFw7m9IgInhPmCCM6s65G5K8Nc5OgYaBIg/exec";

function logAction(action) {
    try {
        fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ action: action, time: new Date().toISOString() })
        });
    } catch (e) {
        console.log("Logging failed", e);
    }
}

logAction("visit");

// SAFE audio play helper
function safePlay(audioEl, label) {
    if (!audioEl) {
        console.warn(label + " not found");
        return;
    }
    const playPromise = audioEl.play();
    if (playPromise !== undefined) {
        playPromise.catch(err => {
            console.warn("Autoplay prevented:", err);
        });
    }
}

// start music after first interaction (only once)
let musicStarted = false;
window.addEventListener("click", () => {
    if (!musicStarted) {
        safePlay(document.getElementById("bgMusic"), "bgMusic");
        musicStarted = true;
    }
});

// typing effect
const text = `يمكن الكلام مش كفاية…\n\nبس أنا فعلاً زعلان إني كنت سبب في مضايقتك.\n\nوجودك في حياتي حاجة أنا مقدرها جداً，\nومش حابب أبداً أكون شخص بيزعلك.\n\nالرسالة دي بس عشان أقولك إني آسف…\ `;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        const el = document.getElementById("message");
        if (el) {
            el.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
        }
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

// hidden message
setTimeout(() => {
    const el = document.getElementById("message");
    if (el) {
        el.innerHTML += "<br><br>انتي عمرك ما هتزعجيني ولا انا متخيل اني ممكن انزعج منك انتي مهمة جدا في حياتي و انتي عارفة حاجة زي دي ";
    }
    logAction("hidden_message_shown");
}, 10000);

// buttons
const okBtn = document.getElementById("ok");
const ignoreBtn = document.getElementById("ignore");
const voiceBtn = document.getElementById("voiceBtn");

if (okBtn) {
    okBtn.addEventListener("click", () => {
        logAction("clicked_ok");
        document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;flex-direction:column;color:white;">
            <h1>شكراً إنك سمعتي انتي عندي بالدنيا و ما فيها</h1>
            <p> كلميني بقي بليز العيد خلص و انا بحاول اصالح فيكي هي غلطتي يعني بس انتي قلبك كبير بقي يا بو</p>
        </div>`;
    });
}

if (ignoreBtn) {
    ignoreBtn.addEventListener("click", () => {
        logAction("clicked_ignore");
    });

    let ignoreCount = 0;
    ignoreBtn.addEventListener("mouseover", () => {
        ignoreCount++;
        logAction("hover_ignore_" + ignoreCount);

        const x = Math.random() * window.innerWidth * 0.8;
        const y = Math.random() * window.innerHeight * 0.8;
        ignoreBtn.style.left = x + "px";
        ignoreBtn.style.top = y + "px";

        if (ignoreCount > 5) {
            const el = document.getElementById("message");
            if (el) {
                el.innerHTML += "<br><br>طيب حتى تجاهلها صعب 😅";
            }
        }
    });
}

if (voiceBtn) {
    voiceBtn.addEventListener("click", () => {
        safePlay(document.getElementById("voiceNote"), "voiceNote");
        logAction("voice_played");
    });
}

// hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

window.addEventListener("click", () => logAction("click_anywhere"));
</script>

</body>
</html>
