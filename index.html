<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة اعتذار يا Boo</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0f172a, #3a0ca3);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    color: white;
    padding: 20px;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.07);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    max-width: 520px;
    width: 100%;
}

h1 { font-size: 2em; margin-bottom: 15px; }

#message {
    font-size: 1.1em;
    line-height: 2;
    text-align: right;
    white-space: pre-line; /* FIX TEXT SPACING */
    margin-bottom: 20px;
}

/* BUTTON CONTAINER FIX */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 25px;
    font-size: 1em;
    cursor: pointer;
    width: 100%;
}

#ok { background: #ff4d6d; color: white; }
#ok:hover { background: #e63950; }

#ignore {
    background: #888;
    color: white;
    position: relative; /* FIX OVERLAP */
}

#voiceBtn { background: #6c63ff; color: white; }

/* Hearts */
.heart {
    position: fixed;
    width: 16px;
    height: 16px;
    background: #ff4d6d;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
    z-index: 1;
}
.heart::before,
.heart::after {
    content: '';
    width: 16px;
    height: 16px;
    background: #ff4d6d;
    border-radius: 50%;
    position: absolute;
}
.heart::before { top: -8px; }
.heart::after { left: -8px; }
@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); }
    100% { transform: translateY(-10vh) rotate(45deg); }
}

/* voice popup */
#voicePopup {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.9em;
    opacity: 0;
    transition: 0.3s;
}

#voicePopup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="container">
    <h1>آسف يا Boo 🤍</h1>
    <div id="message"></div>

    <div class="buttons">
        <button id="ok">قبلت اسفك خلاص مش زعلانة</button>
        <button id="ignore">لا</button>
        <button id="voiceBtn">اسمع الرسالة</button>
    </div>
</div>

<div id="voicePopup">اسف علي صوتي المعفن </div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<audio id="voiceNote" preload="auto">
    <source src="WhatsApp Ptt 2026-03-22 at 1.48.18 PM.ogg" type="audio/ogg">
</audio>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyjzQUzi3othbtNg3xUkgBGqrLLvOMMPBfSpFw7m9IgInhPmCCM6s65G5K8Nc5OgYaBIg/exec";

function logAction(action) {
    try {
        fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ action: action, time: new Date().toISOString() })
        });
    } catch (e) {}
}

logAction("visit");

function safePlay(audioEl) {
    if (!audioEl) return;
    const p = audioEl.play();
    if (p) p.catch(()=>{});
}

let musicStarted = false;
window.addEventListener("click", () => {
    if (!musicStarted) {
        safePlay(document.getElementById("bgMusic"));
        musicStarted = true;
    }
});

// typing (FIX TEXT)
const text = `يمكن الكلام مش كفاية…\n\nبس أنا فعلاً زعلان إني كنت سبب في مضايقتك.\n\nوجودك في حياتي حاجة أنا مقدرها جداً،\nومش حابب أبداً أكون شخص بيزعلك.\n\nالرسالة دي بس عشان أقولك إني آسف…`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        const el = document.getElementById("message");
        if (el) {
            el.innerHTML += text.charAt(i);
        }
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

setTimeout(() => {
    const el = document.getElementById("message");
    if (el) {
        el.innerHTML += "\n\nانتي عمرك ما هتزعجيني ولا انا متخيل اني ممكن انزعج منك";
    }
    logAction("hidden_message_shown");
}, 10000);

// buttons
const okBtn = document.getElementById("ok");
const ignoreBtn = document.getElementById("ignore");
const voiceBtn = document.getElementById("voiceBtn");
const voiceNote = document.getElementById("voiceNote");
const popup = document.getElementById("voicePopup");

if (okBtn) {
    okBtn.addEventListener("click", () => {
        logAction("clicked_ok");
        document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;flex-direction:column;color:white;">
            <h1>شكراً إنك سمعتي انتي عندي بالدنيا و ما فيها</h1>
            <p>كلميني بقي بليز 🙏</p>
        </div>`;
    });
}

if (ignoreBtn) {
    let ignoreCount = 0;

    function moveIgnore(e) {
        ignoreCount++;
        logAction("hover_ignore_" + ignoreCount);

        const x = Math.random() * window.innerWidth * 0.8;
        const y = Math.random() * window.innerHeight * 0.8;
        ignoreBtn.style.position = "absolute";
        ignoreBtn.style.left = x + "px";
        ignoreBtn.style.top = y + "px";
        ignoreBtn.style.zIndex = 9999;
    }

    ignoreBtn.addEventListener("mouseover", moveIgnore);
    ignoreBtn.addEventListener("pointerenter", moveIgnore);

    // On touch devices move on touchstart and prevent the touch from generating clicks
    ignoreBtn.addEventListener("touchstart", function(e) {
        e.preventDefault();
        moveIgnore(e);
    }, { passive: false });

    // Prevent the ignore button's click from propagating to elements beneath it
    ignoreBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        e.preventDefault();
        logAction("clicked_ignore");
    });
}

if (voiceBtn) {
    voiceBtn.addEventListener("click", () => {
        safePlay(voiceNote);
        logAction("voice_played");

        popup.classList.add("show");
        //setTimeout(() => popup.classList.remove("show"), 3000);
    });
}

// hearts
setInterval(() => {
    const h = document.createElement("div");
    h.className = "heart";
    h.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
}, 300);

window.addEventListener("click", () => logAction("click_anywhere"));
</script>

</body>
</html>
