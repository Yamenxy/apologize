<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة اعتذار يا Boo</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0f172a, #3a0ca3);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    overflow-y: auto;
    color: white;
    padding: 20px;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.07);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    max-width: 520px;
    width: 100%;
    z-index: 2;
}

h1 { font-size: 2em; margin-bottom: 15px; }

#message {
    font-size: 1.1em;
    line-height: 1.9;
    min-height: 120px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    font-size: 1em;
    cursor: pointer;
    margin: 8px;
}

#ok { background: #ff4d6d; color: white; }
#ignore { background: #888; color: white; position: absolute; }
#voiceBtn { background: #6c63ff; color: white; }

/* mobile fix */
@media (max-width: 600px) {
    h1 { font-size: 1.6em; }
    #message { font-size: 1em; }
    button { width: 100%; }
}

/* Hearts */
.heart {
    position: fixed;
    width: 18px;
    height: 18px;
    background: #ff4d6d;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
    z-index: 1;
}
.heart::before,
.heart::after {
    content: '';
    width: 18px;
    height: 18px;
    background: #ff4d6d;
    border-radius: 50%;
    position: absolute;
}
.heart::before { top: -9px; left: 0; }
.heart::after { left: -9px; top: 0; }
@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
}

/* voice message popup */
#voiceMessage {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.9em;
    opacity: 0;
    transition: 0.4s;
}

#voiceMessage.show {
    opacity: 1;
}
</style>
</head>
<body>

<div class="container">
    <h1>آسف يا Boo 🤍</h1>
    <div id="message"></div>

    <button id="ok">قبلت اسفك خلاص مش زعلانة</button>
    <button id="ignore">لا</button>
    <br>
    <button id="voiceBtn">اسمع الرسالة</button>
</div>

<div id="voiceMessage">اسف علي صوتي المعفن 😅</div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<audio id="voiceNote" preload="auto">
    <source src="WhatsApp Ptt 2026-03-22 at 1.48.18 PM.ogg" type="audio/ogg">
</audio>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyjzQUzi3othbtNg3xUkgBGqrLLvOMMPBfSpFw7m9IgInhPmCCM6s65G5K8Nc5OgYaBIg/exec";

function logAction(action) {
    try {
        fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ action: action, time: new Date().toISOString() })
        });
    } catch (e) {}
}

logAction("visit");

function safePlay(audioEl) {
    if (!audioEl) return;
    const playPromise = audioEl.play();
    if (playPromise !== undefined) {
        playPromise.catch(() => {});
    }
}

let musicStarted = false;
window.addEventListener("click", () => {
    if (!musicStarted) {
        safePlay(document.getElementById("bgMusic"));
        musicStarted = true;
    }
});

// typing
const text = `يمكن الكلام مش كفاية…\n\nبس أنا فعلاً زعلان إني كنت سبب في مضايقتك.\n\nوجودك في حياتي حاجة أنا مقدرها جداً،\nومش حابب أبداً أكون شخص بيزعلك.\n\nالرسالة دي بس عشان أقولك إني آسف…`;

let i = 0;
function typeWriter() {
    if (i < text.length) {
        const el = document.getElementById("message");
        if (el) {
            el.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
        }
        i++;
        setTimeout(typeWriter, 40);
    }
}
typeWriter();

setTimeout(() => {
    const el = document.getElementById("message");
    if (el) {
        el.innerHTML += "<br><br>انتي عمرك ما هتزعجيني...";
    }
    logAction("hidden_message_shown");
}, 10000);

const voiceBtn = document.getElementById("voiceBtn");
const voiceNote = document.getElementById("voiceNote");
const voiceMsg = document.getElementById("voiceMessage");

if (voiceBtn) {
    voiceBtn.addEventListener("click", () => {
        safePlay(voiceNote);
        logAction("voice_played");

        // show message
        voiceMsg.classList.add("show");
        setTimeout(() => {
            voiceMsg.classList.remove("show");
        }, 3000);
    });
}

// hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
